# Improvement Plan JSON Schema
# Used by AI agents to validate improvement plans derived from feedback.
# File: 90_control/schemas/improvement.yaml
# Reference: PROTOCOL.md Section 3

$id: "kdo://schemas/improvement"
$schema: "http://json-schema.org/draft-07/schema#"
title: "KDO Improvement Plan"
description: >
  Schema for improvement plans stored in 30_wiki/decisions/.
  Actionable plans derived from feedback signals in 60_feedback/.

type: object
required:
  - title
  - type
  - status
  - source_refs
  - created_at
  - updated_at

properties:
  title:
    type: string
    minLength: 1
    maxLength: 120
    description: "Clear action-oriented title."

  type:
    type: string
    enum: [improvement-plan]
    description: "Must be 'improvement-plan'."

  status:
    type: string
    enum: [planned, in-progress, done, cancelled]
    description: "Execution status."

  problem_statement:
    type: string
    description: "What problem or gap triggered this plan?"

  proposed_solution:
    type: string
    description: "What will be done to address it?"

  owner:
    type: string
    description: "Who is responsible for execution (human or AI role)."

  deadline:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    description: "Target completion date. Optional but recommended."

  success_criteria:
    type: array
    minItems: 1
    items:
      type: string
    description: "Measurable outcomes that define 'done'."

  current_stage:
    type: string
    enum: [analysis, design, implementation, validation, shipped]
    description: "Current execution stage."

  source_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^src_[0-9]{8}_[a-f0-9]{8}$"

  created_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  updated_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  related:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"

  tags:
    type: array
    items:
      type: string
      pattern: "^#[a-z0-9-]+$"

  trust_level:
    type: string
    enum: [high, medium, low]

  reviewed_by:
    type: string

  review_date:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

dependencies:
  reviewed_by: [review_date]

additionalProperties: false

examples:
  - title: "Implement automated frontmatter validation"
    type: improvement-plan
    status: in-progress
    problem_statement: "AI creates concept cards with inconsistent frontmatter."
    proposed_solution: "Add kdo lint command with JSON Schema validation."
    owner: "AI Developer"
    deadline: "2026-05-15"
    success_criteria:
      - "kdo lint runs in under 1 second"
      - "All existing pages pass validation"
      - "CI blocks commits with invalid frontmatter"
    current_stage: design
    source_refs: ["src_20260503_protocol_design_session"]
    created_at: "2026-05-03"
    updated_at: "2026-05-03"
    trust_level: high
