# Artifact (Code) JSON Schema
# Used by AI agents to validate frontmatter for code deliverables.
# File: 90_control/schemas/artifact-code.yaml
# Reference: PROTOCOL.md Section 3

$id: "kdo://schemas/artifact-code"
$schema: "http://json-schema.org/draft-07/schema#"
title: "KDO Code Artifact"
description: >
  Schema for code artifacts stored in 40_outputs/code/.
  Apps, plugins, templates, scripts, packages.

type: object
required:
  - title
  - type
  - status
  - source_refs
  - created_at
  - updated_at
  - language

properties:
  title:
    type: string
    minLength: 1
    maxLength: 120

  type:
    type: string
    enum: [artifact]
    description: "Must be 'artifact'. Subtype declared in artifact_type."

  artifact_type:
    type: string
    enum: [app, plugin, template, script, package]
    description: "Code artifact subtype."

  status:
    type: string
    enum: [draft, validated, shipped]
    description: "Delivery lifecycle."

  language:
    type: string
    description: "Primary programming language. (e.g., Python, TypeScript, Rust)"

  dependencies:
    type: array
    items:
      type: string
    description: "Runtime or build dependencies."

  install_path:
    type: string
    description: "How to install or run this artifact."

  test_command:
    type: string
    description: "Command to validate the artifact works."

  license:
    type: string
    enum: [MIT, Apache-2.0, GPL-3.0, proprietary, unknown]
    description: "Software license."

  validation_status:
    type: string
    enum: [pending, passed, failed]
    description: "Quality gate result."

  source_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^src_[0-9]{8}_[a-f0-9]{8}$"

  wiki_refs:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
    description: "Wiki concepts referenced in this artifact."

  definition_of_done:
    type: array
    minItems: 1
    items:
      type: string
    description: "Checklist of completion criteria."

  created_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  updated_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  related:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"

  tags:
    type: array
    items:
      type: string
      pattern: "^#[a-z0-9-]+$"

  trust_level:
    type: string
    enum: [high, medium, low]

  reviewed_by:
    type: string

  review_date:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

dependencies:
  reviewed_by: [review_date]

additionalProperties: false

examples:
  - title: "kdo-cli"
    type: artifact
    artifact_type: package
    status: draft
    language: "Python"
    dependencies: ["pyyaml", "click"]
    install_path: "pip install kdo-cli"
    test_command: "pytest tests/"
    license: MIT
    validation_status: pending
    definition_of_done:
      - "All commands documented with --help"
      - "Install steps tested on clean machine"
      - "Release process documented"
    source_refs: ["src_20260503_protocol_design_session"]
    created_at: "2026-05-03"
    updated_at: "2026-05-03"
    trust_level: medium
