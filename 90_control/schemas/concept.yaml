# Concept Card JSON Schema
# Used by AI agents to validate frontmatter before creating/updating concept pages.
# File: 90_control/schemas/concept.yaml
# Reference: PROTOCOL.md Section 4

$id: "kdo://schemas/concept"
$schema: "http://json-schema.org/draft-07/schema#"
title: "KDO Concept Card"
description: >
  Schema for knowledge cards stored in 30_wiki/concepts/ and 30_wiki/entities/.
  Every concept MUST pass this validation before being written to disk.

type: object
required:
  - title
  - type
  - status
  - source_refs
  - created_at
  - updated_at

properties:
  title:
    type: string
    minLength: 1
    maxLength: 120
    description: "Human-readable title. Use sentence case. No trailing period."

  type:
    type: string
    enum:
      - concept
      - entity
      - comparison
      - decision
      - improvement-plan
      - system
      - trend
    description: >
      concept: abstract idea or knowledge card
      entity: person, company, organization
      comparison: comparing two or more concepts
      decision: decision record or improvement plan
      improvement-plan: actionable plan derived from feedback
      system: architecture or workflow knowledge
      trend: trend analysis

  status:
    type: string
    enum:
      - draft
      - reviewed
      - stable
      - needs-review
    description: >
      draft: initial creation, may contain TODOs
      reviewed: passed human or AI review
      stable: widely referenced, unlikely to change
      needs-review: contradictions found or source questioned

  source_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^src_[0-9]{8}_[a-f0-9]{8}$"
    description: >
      Array of source_ids referencing 10_raw/sources/.
      Format: src_YYYYMMDD_8hexchars
      Must have at least one entry.

  created_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    description: "ISO 8601 date. Example: 2026-05-02"

  updated_at:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    description: "ISO 8601 date. Update on every modification."

  related:
    type: array
    items:
      type: string
      pattern: "^\\[\\[.+\\]\\]$"
    description: >
      Optional bidirectional links to other wiki pages.
      Format: [[Concept Name]] or [[folder/Concept Name]]

  tags:
    type: array
    items:
      type: string
      pattern: "^#[a-z0-9-]+$"
    description: "Optional tags for filtering. Lowercase with hyphens."

  domain:
    type: array
    items:
      type: string
      enum:
        - master
        - ai-saas
        - healthcare
        - yitang
    description: >
      Knowledge domain classification. Multiple domains allowed.
      master: general methodology (KDO, OSCAR, universal frameworks)
      ai-saas: AI products and companies
      healthcare: healthcare industry
      yitang: 一堂 (Yitang) entrepreneurship/management education methodology

  yitang:
    type: object
    description: >
      Optional. 一堂 (Yitang) course-specific metadata.
      Only present when domain includes 'yitang'.
    properties:
      map:
        type: string
        enum:
          - personal
          - management
          - entrepreneur
          - infinite
        description: >
          Which of the four maps this course belongs to:
          personal (个人修炼), management (管理修炼),
          entrepreneur (创业修炼), infinite (无限修炼)
      module:
        type: string
        description: "Course module name in Chinese, e.g. 时间管理"
      course_id:
        type: string
        description: "Course selection number in 一堂's system, e.g. 401"
      course_type:
        type: string
        enum:
          - method
          - case
          - tool
        description: "method: methodology course | case: case study | tool: tool/practice"
      level:
        type: string
        enum:
          - foundational
          - core
          - advanced
        description: "foundational: required basics | core: core curriculum | advanced: advanced topics"
      prerequisites:
        type: array
        items:
          type: string
        description: "List of prerequisite course_ids"
      credits:
        type: integer
        minimum: 1
        description: "Course credits in 一堂's system"
      series:
        type: boolean
        description: "Whether this is a series course (multiple sessions)"

  trust_level:
    type: string
    enum:
      - high
      - medium
      - low
    description: >
      Optional. Self-assessed reliability of the knowledge.
      high: multiple verified sources, direct experience
      medium: single strong source or indirect evidence
      low: hypothesis, speculation, unverified claim

  confidence:
    type: number
    minimum: 0
    maximum: 1
    description: "Optional numeric confidence (0.0-1.0). Overrides trust_level if present."

  reviewed_by:
    type: string
    description: "Optional. Name of human or AI agent that last reviewed this card."

  review_date:
    type: string
    format: date
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    description: "Date of last review. Required if status is reviewed or stable."

dependencies:
  reviewed_by:
    - review_date

additionalProperties: false

examples:
  - title: "Graph RAG for Knowledge Management"
    type: concept
    status: reviewed
    source_refs:
      - "src_20260502_7d7c1b7c"
    created_at: "2026-05-02"
    updated_at: "2026-05-02"
    related:
      - "[[Obsidian + KDO 内容产出工作流]]"
      - "[[KDO Protocol]]"
    tags:
      - #ai
      - #knowledge-graph
    trust_level: medium
    reviewed_by: "Claude"
    review_date: "2026-05-02"
